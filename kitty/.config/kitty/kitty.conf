include ~/.cache/wal/colors-kitty.conf
# --- FONT ---
# You need a Nerd Font for icons to work in Hyprland
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# --- WINDOW LOOK ---
# Adds transparency (0.8 is a good sweet spot)
background_opacity 0.8

# Add padding so text doesn't touch the edges (cleaner look)
window_padding_width 10

# Hide the title bar (Hyprland handles this, so you don't need Kitty's)
hide_window_decorations yes

# --- CURSOR ---
# Makes the cursor match the text color
cursor_shape block
shell_integration no-cursor
