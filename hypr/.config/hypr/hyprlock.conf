# 1. Source the Pywal colors
source = ~/.cache/wal/colors-hyprlock.conf

background {
    monitor =
    # Use the current Pywal wallpaper
    path = $HOME/.cache/current_wallpaper.png
    
    # Fallback color
    color = $background

    # Blur effects (Keep these, they look great)
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.15
    dots_center = true
    
    # Outer ring = Accent Color (usually Color 4)
    outer_color = $color4
    
    # Inner background = Dark Background (Color 0)
    inner_color = $color0
    
    # Text Color = Foreground
    font_color = $foreground
    
    fade_on_empty = false
    
    # Clean placeholder (inherits font_color)
    placeholder_text = <i>Enter Password...</i>
    
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
    
    # Success/Check = Green (Color 2)
    check_color = $color2
    
    # Fail = Red (Color 1)
    fail_color = $color1
    fail_text = <b>Wrong Password!</b>
    
    # Capslock = Yellow (Color 3)
    capslock_color = $color3
}

# Date
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = $foreground
    font_size = 22
    font_family = JetBrains Mono Nerd Font
    position = 0, 300
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%-I:%M")"
    color = $foreground
    font_size = 95
    font_family = JetBrains Mono Nerd Font ExtraBold
    position = 0, 200
    halign = center
    valign = center
}

# User
label {
    monitor =
    text = Hi, $USER
    color = $foreground
    font_size = 18
    font_family = JetBrains Mono Nerd Font
    position = 0, 50
    halign = center
    valign = center
}